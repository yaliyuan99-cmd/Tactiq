      <meta charset="UTF-8" />

      <meta name="description" content="Tactiq turns the human hand into a phone controller. Two smart rings, 60+ gestures, no screen and no voice required — wearable, invisible, fully personal phone control." />
      <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
      <meta name="theme-color" content="#0f0e1a" />

      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      <script>
        // Apply the saved theme before first paint to avoid a flash.
        (function () {
          try {
            var stored = localStorage.getItem("tactiq-theme");
            var dark = stored ? stored === "dark" : true;
            if (dark) document.documentElement.classList.add("dark");
          } catch (e) {
            document.documentElement.classList.add("dark");
          }
        })();
      </script>
      
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
